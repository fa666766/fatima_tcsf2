       .subject-row:hover {background: #e9ecef; transform: translateX(5px);}
       .icon {font-size: 28px; min-width: 40px;}
       .label {flex: 1; font-weight: 600; font-size: 15px;}
       .coef {color: #764ba2; font-weight: 700;}

        input:focus {border-color: #764ba2; outline: none; box-shadow: 0 0 0 3px rgba(118,75,162,0.1);}
        button {width: 100%; padding: 18px; margin-top: 25px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(118,75,162,0.4);}
        button:hover {transform: translateY(-3px); box-shadow: 0 8px 25px rgba(118,75,162,0.5);}
        #resultat {margin-top: 30px; padding: 25px; border-radius: 20px; text-align: center; font-size: 20px; font-weight: 700; display: none; animation: slideIn 0.5s;}
        @keyframes slideIn {from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);}}
       .admis {background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white;}
       .refuse {background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white;}
        #conseil {margin-top: 15px; padding: 20px; background: rgba(255,255,255,0.95); border-radius: 15px; color: #2c3e50; font-size: 15px; line-height: 2; text-align: left;}
       .point-fort {color: #27ae60; font-weight: 700;}
       .point-faible {color: #e74c3c; font-weight: 700;}
        footer {text-align: center; margin-top: 30px; color: #95a5a6; font-size: 13px;}
    </style>
</head>
