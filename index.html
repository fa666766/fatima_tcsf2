<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Calcul Moyenne - Fatima TCSF2</title>

        *{box-sizing:border-box;font-family:'Poppins',Arial}

        .container{max-width:650px;margin:auto}

        .subtitle{text-align:center;color:#7f8c8d;font-size:14px;margin-bottom:25px}
        .matiere{display:grid;grid-template-columns:1fr 80px;gap:12px;align-items:center;margin:12px 0;padding:10px;border-radius:10px;transition:all 0.3s}
        .matiere:hover{background:#f8f9fa}
        .matiere-info{display:flex;align-items:center;gap:10px}
        .icon{font-size:20px}
        .matiere-name{font-size:15px;color:#34495e;font-weight:600}
        .coef-badge{background:linear-gradient(45deg,#e74c3c,#c0392b);color:white;padding:4px 10px;border-radius:15px;font-size:12px;font-weight:bold}
        input{width:100%;padding:12px;border:2px solid #ecf0f1;border-radius:10px;text-align:center;font-size:16px;font-weight:bold;transition:all 0.3s}
        input:focus{border-color:#667eea;transform:scale(1.05);outline:none;box-shadow:0 0 0 4px rgba(102,126,234,0.2)}
        .btn{width:100%;padding:16px;background:linear-gradient(45deg,#11998e,#38ef7d);color:white;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-top:25px;transition:all 0.3s;box-shadow:0 6px 20px rgba(17,153,142,0.4)}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(17,153,142,0.6)}
        #result{margin-top:25px;padding:25px;border-radius:15px;text-align:center;display:none;animation:slideIn 0.6s}
        @keyframes slideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .success{background:linear-gradient(135deg,#11998e,#38ef7d);color:white}
        .danger{background:linear-gradient(135deg,#eb3349,#f45c43);color:white}
        .moyenne{font-size:36px;font-weight:700;margin:10px 0}
        .status{font-size:22px;margin:8px 0;font-weight:600}
        .details{font-size:14px;opacity:0.95;margin-top:12px}
        .conseil{background:rgba(255,255,255,0.2);padding:15px;border-radius:10px;margin-top:15px;text-align:left;font-size:14px;line-height:1.6}
